name: 客户情报监控

on:
  schedule:
    # 每天9点执行 (UTC时间1点，北京时间9点)
    - cron: '0 10 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
    
    - name: 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: 安装依赖
      run: |
        pip install feedparser requests
    
    - name: 执行监控
      env:
        WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
      run: python monitor_free.py
    
    - name: 上传结果
      uses: actions/upload-artifact@v3
      with:
        name: news-data
        path: news_*.json
